name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the site every 6 hours so Airtable data + signed image URLs stay fresh
    - cron: '0 */6 * * *'

permissions:
  contents: read

concurrency:
  group: netlify-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Airtable -> static JSON + images (optional)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          if [ -z "$AIRTABLE_TOKEN" ]; then
            echo "AIRTABLE_TOKEN not set — skipping Airtable sync (site will fall back to data.js)"
          else
            node scripts/sync-airtable.mjs
          fi

      - name: Inject tracking tags (only if env vars are set)
        env:
          GTM_CONTAINER_ID: ${{ secrets.GTM_CONTAINER_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          TIKTOK_PIXEL_ID: ${{ secrets.TIKTOK_PIXEL_ID }}
          GOOGLE_ADS_CONVERSION_ID: ${{ secrets.GOOGLE_ADS_CONVERSION_ID }}
          GOOGLE_ADS_CONVERSION_LABEL_LEAD: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_LEAD }}
          GOOGLE_ADS_CONVERSION_LABEL_WHATSAPP: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_WHATSAPP }}
          GOOGLE_ADS_CONVERSION_LABEL_CALENDLY: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_CALENDLY }}
          CALENDLY_BOOKING_URL: ${{ secrets.CALENDLY_BOOKING_URL }}
        run: node scripts/inject-tags.mjs

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      # Push runtime env vars into Netlify so the Functions (lead-submit.mjs,
      # calendly-webhook.mjs) can read META_CAPI_TOKEN, CRM_API_*, CALENDLY_*.
      # These are runtime env (not build env) — the inject-tags step above only
      # uses the *_CONVERSION_*/PIXEL_ID secrets at build time.
      - name: Sync function env vars to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_CAPI_TOKEN: ${{ secrets.META_CAPI_TOKEN }}
          CRM_API_URL: ${{ secrets.CRM_API_URL }}
          CRM_API_KEY: ${{ secrets.CRM_API_KEY }}
          CALENDLY_WEBHOOK_SIGNING_KEY: ${{ secrets.CALENDLY_WEBHOOK_SIGNING_KEY }}
        run: |
          set_if_present() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              netlify env:set "$name" "$value" --site="$NETLIFY_SITE_ID" --auth="$NETLIFY_AUTH_TOKEN" --context production --secret >/dev/null
              echo "  ✓ $name set"
            else
              echo "  - $name skipped (empty secret)"
            fi
          }
          set_if_present META_PIXEL_ID         "$META_PIXEL_ID"
          set_if_present META_CAPI_TOKEN       "$META_CAPI_TOKEN"
          set_if_present CRM_API_URL           "$CRM_API_URL"
          set_if_present CRM_API_KEY           "$CRM_API_KEY"
          set_if_present CALENDLY_WEBHOOK_SIGNING_KEY "$CALENDLY_WEBHOOK_SIGNING_KEY"

      - name: Deploy project/ to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --dir=project \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --prod \
            --message="GH Actions: ${{ github.sha }} on ${{ github.ref_name }}"

