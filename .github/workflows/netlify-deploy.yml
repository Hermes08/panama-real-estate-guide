name: Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Refresh the site every 6 hours so Airtable data + signed image URLs stay fresh
    - cron: '0 */6 * * *'

permissions:
  contents: read

concurrency:
  group: netlify-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Airtable -> static JSON + images (optional)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          if [ -z "$AIRTABLE_TOKEN" ]; then
            echo "AIRTABLE_TOKEN not set — skipping Airtable sync (site will fall back to data.js)"
          else
            node scripts/sync-airtable.mjs
          fi

      - name: Inject tracking tags (only if env vars are set)
        env:
          GTM_CONTAINER_ID: ${{ secrets.GTM_CONTAINER_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          TIKTOK_PIXEL_ID: ${{ secrets.TIKTOK_PIXEL_ID }}
          GOOGLE_ADS_CONVERSION_ID: ${{ secrets.GOOGLE_ADS_CONVERSION_ID }}
          GOOGLE_ADS_CONVERSION_LABEL_LEAD: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_LEAD }}
          GOOGLE_ADS_CONVERSION_LABEL_WHATSAPP: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_WHATSAPP }}
          GOOGLE_ADS_CONVERSION_LABEL_CALENDLY: ${{ secrets.GOOGLE_ADS_CONVERSION_LABEL_CALENDLY }}
          CALENDLY_BOOKING_URL: ${{ secrets.CALENDLY_BOOKING_URL }}
        run: node scripts/inject-tags.mjs

      - name: Install Netlify CLI
        run: npm install -g netlify-cli@17

      # Push runtime env vars into Netlify so the Functions (lead-submit.mjs,
      # calendly-webhook.mjs) can read META_CAPI_TOKEN, CRM_API_*, CALENDLY_*.
      # These are runtime env (not build env) — the inject-tags step above only
      # uses the *_CONVERSION_*/PIXEL_ID secrets at build time.
      - name: Sync function env vars to Netlify (via API)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          META_CAPI_TOKEN: ${{ secrets.META_CAPI_TOKEN }}
          CRM_API_URL: ${{ secrets.CRM_API_URL }}
          CRM_API_KEY: ${{ secrets.CRM_API_KEY }}
          CALENDLY_WEBHOOK_SIGNING_KEY: ${{ secrets.CALENDLY_WEBHOOK_SIGNING_KEY }}
        run: |
          # Use the Netlify REST API directly. The env:set CLI subcommand does
          # not accept --site / --filter, so we POST to /accounts/{slug}/env
          # with a site_id query param. Idempotent — falls back to PATCH on
          # 400 "key already exists".
          ACCOUNT=$(curl -s -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
            "https://api.netlify.com/api/v1/sites/$NETLIFY_SITE_ID" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('account_slug',''))")
          if [ -z "$ACCOUNT" ]; then
            echo "::error::Could not resolve account_slug from NETLIFY_SITE_ID"
            exit 1
          fi
          echo "account_slug=$ACCOUNT, site=$NETLIFY_SITE_ID"

          set_env() {
            local name="$1" value="$2"
            if [ -z "$value" ]; then echo "  - $name skipped"; return 0; fi
            local body
            body=$(VAL="$value" KEY="$name" python3 -c "import os,json; print(json.dumps([{'key':os.environ['KEY'],'values':[{'value':os.environ['VAL'],'context':'production'}]}]))")
            local code
            code=$(curl -s -o /tmp/r.json -w "%{http_code}" -X POST \
              -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
              -H "Content-Type: application/json" \
              "https://api.netlify.com/api/v1/accounts/$ACCOUNT/env?site_id=$NETLIFY_SITE_ID" \
              -d "$body")
            if [ "$code" = "201" ] || [ "$code" = "200" ]; then
              echo "  ✓ $name created"
            elif [ "$code" = "400" ] && grep -q "already exists" /tmp/r.json; then
              local pbody
              pbody=$(VAL="$value" python3 -c "import os,json; print(json.dumps({'context':'production','value':os.environ['VAL']}))")
              local code2
              code2=$(curl -s -o /tmp/r2.json -w "%{http_code}" -X PATCH \
                -H "Authorization: Bearer $NETLIFY_AUTH_TOKEN" \
                -H "Content-Type: application/json" \
                "https://api.netlify.com/api/v1/accounts/$ACCOUNT/env/$name?site_id=$NETLIFY_SITE_ID" \
                -d "$pbody")
              [ "$code2" = "200" ] && echo "  ↻ $name updated" || echo "  ✗ $name PATCH HTTP $code2: $(cat /tmp/r2.json)"
            else
              echo "  ✗ $name HTTP $code: $(cat /tmp/r.json)"
            fi
          }

          set_env META_PIXEL_ID                "$META_PIXEL_ID"
          set_env META_CAPI_TOKEN              "$META_CAPI_TOKEN"
          set_env CRM_API_URL                  "$CRM_API_URL"
          set_env CRM_API_KEY                  "$CRM_API_KEY"
          set_env CALENDLY_WEBHOOK_SIGNING_KEY "$CALENDLY_WEBHOOK_SIGNING_KEY"

      - name: Deploy project/ to Netlify (production)
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          netlify deploy \
            --dir=project \
            --site="$NETLIFY_SITE_ID" \
            --auth="$NETLIFY_AUTH_TOKEN" \
            --prod \
            --message="GH Actions: ${{ github.sha }} on ${{ github.ref_name }}"

