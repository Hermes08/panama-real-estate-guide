name: Deploy staging to GitHub Pages

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: gh-pages-staging
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync Airtable -> static JSON + images (optional)
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: |
          if [ -z "$AIRTABLE_TOKEN" ]; then
            echo "AIRTABLE_TOKEN not set — skipping Airtable sync"
          else
            node scripts/sync-airtable.mjs
          fi

      - name: Inject tracking tags (only if env vars are set)
        env:
          GTM_CONTAINER_ID: ${{ secrets.GTM_CONTAINER_ID }}
          META_PIXEL_ID: ${{ secrets.META_PIXEL_ID }}
          GA4_MEASUREMENT_ID: ${{ secrets.GA4_MEASUREMENT_ID }}
          TIKTOK_PIXEL_ID: ${{ secrets.TIKTOK_PIXEL_ID }}
          CALENDLY_BOOKING_URL: ${{ secrets.CALENDLY_BOOKING_URL }}
        run: node scripts/inject-tags.mjs

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./project
      - id: deployment
        uses: actions/deploy-pages@v4
