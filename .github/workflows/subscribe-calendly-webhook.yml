name: Subscribe Calendly webhook (one-shot)

on:
  workflow_dispatch:

jobs:
  subscribe:
    runs-on: ubuntu-latest
    steps:
      - name: Subscribe webhook
        env:
          CAL_TOKEN: ${{ secrets.CALENDLY_PERSONAL_ACCESS_TOKEN }}
          CAL_USER:  ${{ secrets.CALENDLY_USER_URI }}
          CAL_SIGN:  ${{ secrets.CALENDLY_WEBHOOK_SIGNING_KEY }}
          WEBHOOK_URL: https://panamarealestateguide.com/api/calendly-webhook
        run: |
          set -euo pipefail
          if [ -z "$CAL_TOKEN" ] || [ -z "$CAL_USER" ] || [ -z "$CAL_SIGN" ]; then
            echo "::error::Missing CALENDLY_PERSONAL_ACCESS_TOKEN / _USER_URI / _WEBHOOK_SIGNING_KEY"
            exit 1
          fi

          echo "Reading Calendly user / organization..."
          curl -s -H "Authorization: Bearer $CAL_TOKEN" https://api.calendly.com/users/me > /tmp/me.json
          ORG=$(python3 -c 'import json; print(json.load(open("/tmp/me.json"))["resource"]["current_organization"])')
          echo "  organization: $ORG"
          echo "  user: $CAL_USER"

          echo "Listing existing subscriptions..."
          curl -s -G \
            -H "Authorization: Bearer $CAL_TOKEN" \
            --data-urlencode "organization=$ORG" \
            --data-urlencode "user=$CAL_USER" \
            --data-urlencode "scope=user" \
            "https://api.calendly.com/webhook_subscriptions" > /tmp/existing.json

          MATCH=$(WEBHOOK="$WEBHOOK_URL" python3 -c 'import json,os; d=json.load(open("/tmp/existing.json")); h=[s for s in d.get("collection",[]) if s.get("callback_url")==os.environ["WEBHOOK"]]; print(h[0]["uri"] if h else "")')

          if [ -n "$MATCH" ]; then
            echo "Already subscribed: $MATCH"
            exit 0
          fi

          echo "Creating new webhook subscription..."
          URL="$WEBHOOK_URL" ORG="$ORG" USER="$CAL_USER" SIGN="$CAL_SIGN" python3 -c 'import os,json; print(json.dumps({"url":os.environ["URL"],"events":["invitee.created","invitee.canceled"],"organization":os.environ["ORG"],"user":os.environ["USER"],"scope":"user","signing_key":os.environ["SIGN"]}))' > /tmp/body.json

          curl -s -X POST https://api.calendly.com/webhook_subscriptions \
            -H "Authorization: Bearer $CAL_TOKEN" \
            -H "Content-Type: application/json" \
            -d @/tmp/body.json > /tmp/resp.json
          python3 -m json.tool < /tmp/resp.json
          python3 -c 'import sys,json; d=json.load(open("/tmp/resp.json")); sys.exit(0 if d.get("resource") else 1)'
          echo "Subscription created."
