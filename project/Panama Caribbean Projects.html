<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>PanamaRealEstateGuide.com — Developer projects · Journal · Reservations</title>
  <meta name="description" content="Developer-direct Panama projects across Caribbean, Pacific, Azuero and highland coasts. Reserve your unit with a refundable deposit. EN · ES · PT · DE."/>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="styles.css"/>

  <script defer src="https://unpkg.com/three@0.160.0/build/three.min.js" integrity="sha384-qOkzR5Ke/XkQxuGVJ9hpFEpDlcoLtWwVYhnJf06cLIZa2vaIptSqaubivErzmD5O" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script defer src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script defer src="data.js?v=1777260393"></script>
  <script defer src="webgl-rainforest.js?v=1777260393"></script>
  <script defer type="text/babel" src="components.jsx?v=1777260393"></script>
  <script defer type="text/babel" src="sections.jsx?v=1777260393"></script>

  <script type="text/babel">
    function App() {
      const [heroVariant, setHeroVariant] = React.useState(() => {
        return localStorage.getItem('heroVariant') || 'editorial';
      });

      React.useEffect(() => {
        localStorage.setItem('heroVariant', heroVariant);
      }, [heroVariant]);

      React.useEffect(() => {
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
        }, { threshold: 0.1 });
        const obs = () => document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
        obs();
        const t = setInterval(obs, 500);
        return () => { io.disconnect(); clearInterval(t); };
      }, []);

      return (
        <>
          <Navbar transparent={false}/>
          {heroVariant === 'editorial' ? <HeroEditorial/> : <Hero/>}
          <Marquee/>
          <Projects/>
          <Regions/>
          <Journal/>
          <News/>
          <Testimonials/>
          <FAQ/>
          <ReserveCTA/>
          <Footer/>

          {/* Hero variant switcher (small, bottom-left) */}
          <div style={{
            position: 'fixed', left: 20, bottom: 20, zIndex: 40,
            display: 'flex', gap: 0, background: 'var(--ink)', color: 'var(--cream)',
            borderRadius: 999, padding: 4, boxShadow: '0 12px 28px -8px rgba(11,39,51,0.4)',
            fontFamily: 'var(--font-mono)', fontSize: 10.5, letterSpacing: '0.08em',
            textTransform: 'uppercase', fontWeight: 700
          }}>
            <div style={{ padding: '6px 12px 6px 14px', opacity: 0.6 }}>Hero</div>
            {[
              { id: 'editorial', label: 'Editorial' },
              { id: 'rainforest', label: 'Rainforest' }
            ].map(v => (
              <button key={v.id} onClick={() => setHeroVariant(v.id)} style={{
                padding: '6px 14px', border: 'none', cursor: 'pointer',
                background: heroVariant === v.id ? 'var(--coral)' : 'transparent',
                color: heroVariant === v.id ? 'var(--paper)' : 'var(--cream)',
                borderRadius: 999, fontFamily: 'inherit', fontSize: 'inherit',
                letterSpacing: 'inherit', textTransform: 'inherit', fontWeight: 'inherit',
                transition: 'all 0.2s var(--ease)'
              }}>
                {v.label}
              </button>
            ))}
          </div>

          <a href="https://wa.me/50767610315" target="_blank" rel="noopener" aria-label="WhatsApp" style={{
            position: 'fixed', right: 20, bottom: 20, zIndex: 40,
            width: 54, height: 54, borderRadius: '50%',
            background: '#25D366', color: '#fff',
            boxShadow: '0 12px 28px -8px rgba(37,211,102,0.55)',
            display: 'grid', placeItems: 'center', textDecoration: 'none'
          }}>
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2a10 10 0 0 0-8.7 15.1L2 22l5-1.3A10 10 0 1 0 12 2Zm5.5 14.2c-.2.7-1.2 1.3-1.9 1.4-.5.1-1.1.1-1.8-.1a16 16 0 0 1-4.2-2.1 12 12 0 0 1-3.1-3.7c-.4-.6-.9-1.6-.9-2.5s.5-1.4.7-1.6c.2-.2.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.3 0 .5l-.4.5c-.1.1-.3.3-.1.6a9 9 0 0 0 1.6 2 8 8 0 0 0 2.3 1.4c.3.1.5.1.6 0l.6-.7c.2-.3.5-.2.7-.1l2 .9c.2.1.4.2.5.3 0 .1 0 .7-.2 1.5Z"/>
            </svg>
          </a>
        </>
      );
    }

    // Hydrate project data from the build-time Airtable snapshot, then render.
    // If the snapshot can't be loaded, render with the data.js fallback already in memory.
    function renderApp() {
      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    }

    fetch('airtable-projects.json', { cache: 'no-cache' })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        if (data && Array.isArray(data.projects) && data.projects.length) {
          window.PANAMA_DATA.projects = data.projects;
          window.PANAMA_DATA._projectsSource = 'airtable';
          window.PANAMA_DATA._projectsGeneratedAt = data.generatedAt;
          window.PANAMA_DATA._projectsCount = data.count;
        }
      })
      .catch(err => {
        console.info('[projects] using data.js fallback —', err);
        window.PANAMA_DATA._projectsSource = 'fallback';
      })
      .finally(renderApp);
  </script>
</body>
</html>
