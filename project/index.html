  <script type="module">
// Jaguar wireframe scene — adapted from neon_jaguar reference.
// Loads assets/jaguar.glb, builds a wireframe + point-cloud render in the
// website's coral palette with subtle bloom. Exposes window.JaguarScene(canvas).
//
// This file is an ES module — load it with <script type="module">.

import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

/* Palette — matches the website (coral primary, no pink) */
const CORAL_DEEP  = new THREE.Color(0xE14F2E); // deep coral — same as --coral-deep
const CORAL       = new THREE.Color(0xE37363);
const CORAL_BR    = new THREE.Color(0xEC8F73); // brighter coral
const CORAL_SOFT  = new THREE.Color(0xF6BBA0); // soft, for points
const EYE_GLOW    = new THREE.Color(0xFFE6D0); // warm cream highlight

/* Cache the loaded GLTF so multiple mounts don't reparse the 9MB GLB */
let glbPromise = null;
function loadJaguarGLB() {
  if (!glbPromise) {
    glbPromise = new Promise((resolve, reject) => {
      const loader = new GLTFLoader();
      loader.load('assets/jaguar.glb', resolve, undefined, reject);
    });
  }
  // Each consumer needs its OWN copy of the scene/animations, so re-clone.
  return glbPromise.then(gltf => ({
    sceneClone: gltf.scene.clone(true),
    animations: gltf.animations
  }));
}

/* Subdivide each triangle into 4 (recursively `passes` times) — gives a much
   denser wireframe so the silhouette reads even on a small canvas. */
function subdivideTriangles(geometry, passes = 1) {
  const geo = geometry.index ? geometry.toNonIndexed() : geometry.clone();
  const pos = geo.attributes.position;
  const skin = geo.attributes.skinIndex;
  const skinW = geo.attributes.skinWeight;

  let positions = [];
  for (let i = 0; i < pos.count; i++) {
    positions.push([pos.getX(i), pos.getY(i), pos.getZ(i)]);
  }
  let skins = null, weights = null;
  if (skin) {
    skins = []; weights = [];
    for (let i = 0; i < skin.count; i++) {
      skins.push([skin.getX(i), skin.getY(i), skin.getZ(i), skin.getW(i)]);
      weights.push([skinW.getX(i), skinW.getY(i), skinW.getZ(i), skinW.getW(i)]);
    }
  }

  for (let p = 0; p < passes; p++) {
    const np = [], ns = skins ? [] : null, nw = weights ? [] : null;
    for (let i = 0; i < positions.length; i += 3) {
      const a = positions[i], b = positions[i+1], c = positions[i+2];
      const ab = [(a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2];
      const bc = [(b[0]+c[0])/2,(b[1]+c[1])/2,(b[2]+c[2])/2];
      const ca = [(c[0]+a[0])/2,(c[1]+a[1])/2,(c[2]+a[2])/2];
      np.push(a, ab, ca,  ab, b, bc,  ca, bc, c,  ab, bc, ca);
      if (skins) {
        const wa = weights[i], wb = weights[i+1], wc = weights[i+2];
        const wab = [(wa[0]+wb[0])/2,(wa[1]+wb[1])/2,(wa[2]+wb[2])/2,(wa[3]+wb[3])/2];
        const wbc = [(wb[0]+wc[0])/2,(wb[1]+wc[1])/2,(wb[2]+wc[2])/2,(wb[3]+wc[3])/2];
        const wca = [(wc[0]+wa[0])/2,(wc[1]+wa[1])/2,(wc[2]+wa[2])/2,(wc[3]+wa[3])/2];
        ns.push(skins[i], skins[i], skins[i],  skins[i+1], skins[i+1], skins[i+1],
                skins[i+2], skins[i+2], skins[i+2],  skins[i], skins[i+1], skins[i+2]);
        nw.push(wa, wab, wca,  wab, wb, wbc,  wca, wbc, wc,  wab, wbc, wca);
      }
    }
    positions = np;
    if (skins) { skins = ns; weights = nw; }
  }

  const out = new THREE.BufferGeometry();
  const flat = new Float32Array(positions.length * 3);
  for (let i = 0; i < positions.length; i++) {
    flat[i*3] = positions[i][0]; flat[i*3+1] = positions[i][1]; flat[i*3+2] = positions[i][2];
  }
  out.setAttribute('position', new THREE.BufferAttribute(flat, 3));
  if (skins) {
    const sFlat = new Float32Array(skins.length * 4);
    const wFlat = new Float32Array(weights.length * 4);
    for (let i = 0; i < skins.length; i++) {
      sFlat[i*4] = skins[i][0]; sFlat[i*4+1] = skins[i][1]; sFlat[i*4+2] = skins[i][2]; sFlat[i*4+3] = skins[i][3];
      wFlat[i*4] = weights[i][0]; wFlat[i*4+1] = weights[i][1]; wFlat[i*4+2] = weights[i][2]; wFlat[i*4+3] = weights[i][3];
    }
    out.setAttribute('skinIndex', new THREE.BufferAttribute(sFlat, 4));
    out.setAttribute('skinWeight', new THREE.BufferAttribute(wFlat, 4));
  }
  out.computeVertexNormals();
  return out;
}

/* Build wireframe + dust overlays on every mesh in the model, hide the solid mesh. */
function buildWireframeOverlay(model, registries) {
  // Normal blending + deep coral — on a cream background, additive blending
  // just adds to white and the silhouette disappears. Normal blending lets the
  // coral line actually register as an outline.
  // Ambient mascot — v4 (watermark). The jaguar is a texture, not a subject.
  // Opacity set low enough that editorial copy reads first; the cat's silhouette
  // is still perceivable because the canvas's dense subdivided wireframe gives it
  // thousands of tiny coral strokes concentrated where the body is.
  const wireMat = new THREE.MeshBasicMaterial({
    color: CORAL_DEEP, wireframe: true, transparent: true, opacity: 0.7,
    depthWrite: false, blending: THREE.NormalBlending
  });
  const wireMatBright = new THREE.MeshBasicMaterial({
    color: CORAL, wireframe: true, transparent: true, opacity: 0.28,
    depthWrite: false, blending: THREE.NormalBlending
  });
  // Outer neon halo — additive, brighter, slightly larger. Bloom catches THIS
  // and creates the futuristic neon rim around the silhouette without nuking the body.
  const wireMatHalo = new THREE.MeshBasicMaterial({
    color: CORAL_BR, wireframe: true, transparent: true, opacity: 0.55,
    depthWrite: false, blending: THREE.AdditiveBlending
  });
  const pointMat = new THREE.PointsMaterial({
    color: CORAL_SOFT, size: 0.018, transparent: true, opacity: 0.55,
    sizeAttenuation: true, depthWrite: false, blending: THREE.NormalBlending
  });

  const targets = [];
  model.traverse(c => { if (c.isMesh) targets.push(c); });

  targets.forEach(child => {
    const name = (child.name || '') + ' ' + (child.material?.name || '');
    const isEye    = /eye|ojo/i.test(name);
    const isTongue = /tongue|lengua/i.test(name);
    if (isTongue) { child.visible = false; return; }
    if (isEye) {
      child.material = new THREE.MeshBasicMaterial({
        color: EYE_GLOW, transparent: true, opacity: 1,
        blending: THREE.AdditiveBlending, depthWrite: false
      });
      return;
    }

    const dense = subdivideTriangles(child.geometry, 2);
    let wire, wireOuter, wireHalo, pts;
    if (child.isSkinnedMesh) {
      wire = new THREE.SkinnedMesh(dense, wireMat.clone());
      wire.bind(child.skeleton, child.bindMatrix); wire.bindMode = child.bindMode;
      wireOuter = new THREE.SkinnedMesh(dense, wireMatBright.clone());
      wireOuter.bind(child.skeleton, child.bindMatrix); wireOuter.bindMode = child.bindMode;
      wireOuter.scale.setScalar(0.995);
      wireHalo = new THREE.SkinnedMesh(dense, wireMatHalo.clone());
      wireHalo.bind(child.skeleton, child.bindMatrix); wireHalo.bindMode = child.bindMode;
      wireHalo.scale.setScalar(1.035);
      pts = new THREE.Points(dense, pointMat.clone());
    } else {
      wire = new THREE.Mesh(dense, wireMat.clone());
      wireOuter = new THREE.Mesh(dense, wireMatBright.clone());
      wireOuter.scale.setScalar(0.995);
      wireHalo = new THREE.Mesh(dense, wireMatHalo.clone());
      wireHalo.scale.setScalar(1.035);
      pts = new THREE.Points(dense, pointMat.clone());
    }
    wire.frustumCulled = false; wireOuter.frustumCulled = false;
    wireHalo.frustumCulled = false; pts.frustumCulled = false;
    child.add(wire); child.add(wireOuter); child.add(wireHalo); child.add(pts);

    registries.wires.push(wire, wireOuter, wireHalo);
    registries.points.push(pts);

    // Hide the solid mesh
    child.material = new THREE.MeshBasicMaterial({
      color: 0x000000, transparent: true, opacity: 0, depthWrite: true
    });
  });
}

/* Main entry — exposed on window for the React component to call. */
window.JaguarScene = function(canvas) {
  const renderer = new THREE.WebGLRenderer({
    canvas, antialias: true, alpha: true, powerPreference: 'high-performance',
    preserveDrawingBuffer: true
  });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  // Match the canvas clear color to the panel's #0B1F28 exactly so the canvas
  // blends seamlessly into the dark news panel — no visible "square" edge.
  renderer.setClearColor(0x0B1F28, 1.0);
  renderer.toneMapping = THREE.LinearToneMapping;
  renderer.toneMappingExposure = 1.0;

  const scene = new THREE.Scene();
  // No fog — we want the cream page color to show through cleanly
  const aspect = (canvas.clientWidth || 1) / (canvas.clientHeight || 1);
  // Bird's-eye view, angled to the right — elevated enough to see the full body
  // including all four paws, but not pure top-down (the cat reads as a sculptural
  // creature, not a rug).
  // User-tuned camera + pose (locked via the ?edit=1 tuner panel).
  const camera = new THREE.PerspectiveCamera(36, aspect, 0.1, 200);
  camera.position.set(2.80, 7.25, 3.00);
  // Look at a point ABOVE the cat so it renders in the bottom portion of the
  // (now full-height) canvas. Top of the canvas stays clean dark for news copy.
  camera.lookAt(-0.70, 1.20, -0.70);

  // Post-processing: subtle bloom (much lower than reference)
  const composer = new EffectComposer(renderer);
  composer.addPass(new RenderPass(scene, camera));
  const bloom = new UnrealBloomPass(
    new THREE.Vector2(canvas.clientWidth || 1, canvas.clientHeight || 1),
    0.65, // strength — visible glow, body detail preserved
    0.85, // radius
    0.6   // threshold — only the hottest pixels (halo + floor core) get bloom
  );
  composer.addPass(bloom);
  composer.addPass(new OutputPass());

  /* DEBUG: full slider control panel for camera + model.
     Activated with ?edit=1. OrbitControls also wired so you can drag/scroll if
     you want — the sliders stay in sync with whatever you do. */
  const params = new URLSearchParams(window.location.search);
  const EDIT = params.get('edit') === '1';
  let controls = null;
  let dbg = null;
  // Live tuning state — these mirror the actual scene values and the panel
  // both reads from and writes to them.
  const tune = {
    camX: 2.80, camY: 7.25, camZ: 3.00,
    tgtX: -0.70, tgtY: 1.20, tgtZ: -0.70,
    fov: 36,
    rotX: 0.850, rotY: 0.690, rotZ: -0.310,
    posX: 0, posY: 0, posZ: 0,
    scale: 1.0,
    bloomStrength: 0.65, bloomRadius: 0.85, bloomThreshold: 0.6,
    wireOpacity: 0.7, haloOpacity: 0.55, floorOpacity: 1.0
  };
  if (EDIT) {
    // OrbitControls — fully unrestricted (any angle, any zoom)
    controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 0.1;
    controls.maxDistance = 50;
    controls.minPolarAngle = 0;          // can look straight down
    controls.maxPolarAngle = Math.PI;    // can look straight up
    controls.target.set(tune.tgtX, tune.tgtY, tune.tgtZ);
    controls.update();

    // Helper to make a slider row
    function row(label, key, min, max, step) {
      return (
        '<div style="display:grid;grid-template-columns:60px 1fr 56px;gap:6px;align-items:center;margin:3px 0">' +
          '<span style="color:#6E8A91;font-size:10px">' + label + '</span>' +
          '<input data-tune="' + key + '" type="range" min="' + min + '" max="' + max + '" step="' + step + '" value="' + tune[key] + '" ' +
            'style="width:100%;accent-color:#FF6B4A"/>' +
          '<input data-tune-num="' + key + '" type="number" min="' + min + '" max="' + max + '" step="' + step + '" value="' + tune[key] + '" ' +
            'style="width:56px;background:#0B2733;color:#FFF9EC;border:1px solid #254957;padding:2px 4px;border-radius:3px;font:10px ui-monospace"/>' +
        '</div>'
      );
    }
    function group(title, ...rowsHtml) {
      return (
        '<div style="margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,249,236,0.1)">' +
          '<div style="font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#FF6B4A;font-size:9px;margin-bottom:4px">' + title + '</div>' +
          rowsHtml.join('') +
        '</div>'
      );
    }

    dbg = document.createElement('div');
    dbg.id = 'jag-tuner';
    dbg.style.cssText = 'position:fixed;left:16px;top:16px;z-index:9999;background:rgba(11,39,51,0.95);color:#FFF9EC;font:11px/1.4 ui-monospace,Menlo,Consolas,monospace;padding:12px 14px;border-radius:10px;width:320px;max-height:92vh;overflow-y:auto;box-shadow:0 12px 28px -8px rgba(0,0,0,0.5)';
    dbg.innerHTML =
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">' +
        '<span style="font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#FF6B4A;font-size:10px">Jaguar tuner</span>' +
        '<button id="jag-min" style="background:transparent;color:#FFF9EC;border:1px solid #254957;padding:2px 8px;border-radius:4px;cursor:pointer;font:10px ui-monospace">_</button>' +
      '</div>' +
      '<div id="jag-body">' +
        group('Camera position',
          row('X', 'camX', -10, 10, 0.05),
          row('Y', 'camY', -10, 10, 0.05),
          row('Z', 'camZ', -10, 10, 0.05)
        ) +
        group('Camera lookAt',
          row('X', 'tgtX', -3, 3, 0.05),
          row('Y', 'tgtY', -3, 3, 0.05),
          row('Z', 'tgtZ', -3, 3, 0.05)
        ) +
        group('Camera FOV',
          row('FOV', 'fov', 10, 90, 1)
        ) +
        group('Model rotation (rad)',
          row('X', 'rotX', -3.15, 3.15, 0.01),
          row('Y', 'rotY', -3.15, 3.15, 0.01),
          row('Z', 'rotZ', -3.15, 3.15, 0.01)
        ) +
        group('Model position',
          row('X', 'posX', -3, 3, 0.05),
          row('Y', 'posY', -3, 3, 0.05),
          row('Z', 'posZ', -3, 3, 0.05)
        ) +
        group('Model scale',
          row('Scl', 'scale', 0.2, 4, 0.05)
        ) +
        group('Neon glow',
          row('Bloom', 'bloomStrength', 0, 3, 0.05),
          row('Radius', 'bloomRadius', 0, 2, 0.05),
          row('Thresh', 'bloomThreshold', 0, 1, 0.02),
          row('Wire α', 'wireOpacity', 0, 1, 0.02),
          row('Halo α', 'haloOpacity', 0, 1, 0.02),
          row('Floor α', 'floorOpacity', 0, 2, 0.05)
        ) +
        '<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">' +
          '<button id="jag-copy" style="background:#FF6B4A;color:#FFF9EC;border:0;padding:7px 10px;border-radius:6px;cursor:pointer;font:600 10px ui-monospace;letter-spacing:.1em;text-transform:uppercase">Copy snippet</button>' +
          '<button id="jag-reset" style="background:#254957;color:#FFF9EC;border:0;padding:7px 10px;border-radius:6px;cursor:pointer;font:600 10px ui-monospace;letter-spacing:.1em;text-transform:uppercase">Reset</button>' +
        '</div>' +
        '<pre id="jag-snip" style="margin:8px 0 0;white-space:pre-wrap;word-break:break-word;color:#FFF9EC;font-size:10px;background:#0B2733;padding:8px;border-radius:5px"></pre>' +
      '</div>';
    document.body.appendChild(dbg);

    // Hookups: every slider AND its number input writes to `tune` and the live render
    function applyTune() {
      camera.position.set(tune.camX, tune.camY, tune.camZ);
      camera.fov = tune.fov;
      camera.updateProjectionMatrix();
      controls.target.set(tune.tgtX, tune.tgtY, tune.tgtZ);
      if (modelGroup) {
        modelGroup.rotation.set(tune.rotX, tune.rotY, tune.rotZ);
        // posX/Y/Z are OFFSETS on top of the original auto-centering
        if (modelGroup.userData._origPos) {
          const o = modelGroup.userData._origPos;
          modelGroup.position.set(o.x + tune.posX, o.y + tune.posY, o.z + tune.posZ);
        }
        if (modelGroup.userData._origScale != null) {
          modelGroup.scale.setScalar(modelGroup.userData._origScale * tune.scale);
        }
      }
      // GLOW
      if (typeof glowRefs !== 'undefined' && glowRefs.bloom) {
        glowRefs.bloom.strength = tune.bloomStrength;
        glowRefs.bloom.radius = tune.bloomRadius;
        glowRefs.bloom.threshold = tune.bloomThreshold;
      }
      if (typeof glowRefs !== 'undefined' && glowRefs.registries) {
        glowRefs.registries.wires.forEach(function(m, i){
          var slot = i % 3;
          if (slot === 0)      m.material.opacity = tune.wireOpacity;
          else if (slot === 1) m.material.opacity = tune.wireOpacity * 0.4;
          else                 m.material.opacity = tune.haloOpacity;
        });
      }
      if (typeof glowRefs !== 'undefined' && glowRefs.neonFloor) glowRefs.neonFloor.material.opacity = tune.floorOpacity;
      if (typeof glowRefs !== 'undefined' && glowRefs.neonCore)  glowRefs.neonCore.material.opacity = tune.floorOpacity;
    }
    function bindAll() {
      const inputs = dbg.querySelectorAll('[data-tune], [data-tune-num]');
      inputs.forEach(el => {
        el.addEventListener('input', (e) => {
          const key = el.dataset.tune || el.dataset.tuneNum;
          tune[key] = parseFloat(el.value);
          // Sync sibling sliders + number inputs
          dbg.querySelectorAll('[data-tune="'+key+'"], [data-tune-num="'+key+'"]').forEach(sib => {
            if (sib !== el) sib.value = tune[key];
          });
          applyTune();
        });
      });
    }
    bindAll();

    document.getElementById('jag-copy').addEventListener('click', () => {
      navigator.clipboard.writeText(document.getElementById('jag-snip').textContent.trim());
      const b = document.getElementById('jag-copy');
      const t = b.textContent; b.textContent = 'Copied!';
      setTimeout(() => { b.textContent = t; }, 1200);
    });
    document.getElementById('jag-reset').addEventListener('click', () => {
      Object.assign(tune, { camX:2.80, camY:7.25, camZ:3.00, tgtX:-0.70, tgtY:1.20, tgtZ:-0.70, fov:36, rotX:0.850, rotY:0.690, rotZ:-0.310, posX:0, posY:0, posZ:0, scale:1.0, bloomStrength:0.65, bloomRadius:0.85, bloomThreshold:0.6, wireOpacity:0.7, haloOpacity:0.55, floorOpacity:1.0 });
      dbg.querySelectorAll('[data-tune], [data-tune-num]').forEach(el => {
        const k = el.dataset.tune || el.dataset.tuneNum;
        el.value = tune[k];
      });
      applyTune();
    });
    // Collapsible toggle
    let collapsed = false;
    document.getElementById('jag-min').addEventListener('click', () => {
      collapsed = !collapsed;
      document.getElementById('jag-body').style.display = collapsed ? 'none' : 'block';
    });

    canvas.style.pointerEvents = 'auto';
    if (canvas.parentElement) canvas.parentElement.style.pointerEvents = 'auto';
  }

  /* Neon floor disc — radial coral gradient flat on the ground, additive,
     positioned under the jaguar so it reads as a halo of light on the floor. */
  function makeNeonFloorTexture() {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 1024;
    const ctx = c.getContext('2d');
    const grad = ctx.createRadialGradient(512, 512, 30, 512, 512, 512);
    // Hot center -> coral -> faint outer. Higher alpha = much more visible glow.
    grad.addColorStop(0,    'rgba(255, 200, 170, 0.85)');
    grad.addColorStop(0.10, 'rgba(255, 143, 115, 0.7)');
    grad.addColorStop(0.30, 'rgba(255, 107, 74, 0.45)');
    grad.addColorStop(0.60, 'rgba(225, 79, 46, 0.18)');
    grad.addColorStop(0.90, 'rgba(225, 79, 46, 0.04)');
    grad.addColorStop(1,    'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, 1024, 1024);
    const tex = new THREE.CanvasTexture(c);
    tex.colorSpace = THREE.SRGBColorSpace;
    return tex;
  }
  const neonFloorMat = new THREE.MeshBasicMaterial({
    map: makeNeonFloorTexture(),
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    side: THREE.DoubleSide
  });
  // Bigger plane and a second smaller hot core stacked on top for a brighter
  // "puddle of light" look on the floor.
  const neonFloor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), neonFloorMat);
  neonFloor.rotation.x = -Math.PI / 2;
  neonFloor.position.set(1.79, 0.01, 0.27);
  scene.add(neonFloor);
  const neonCore = new THREE.Mesh(new THREE.PlaneGeometry(3, 3), neonFloorMat.clone());
  neonCore.rotation.x = -Math.PI / 2;
  neonCore.position.set(1.79, 0.02, 0.27);
  scene.add(neonCore);

  /* Ground — a few faint horizon lines (no full grid; subtler) */
  const groundGroup = new THREE.Group();
  for (let i = 0; i < 5; i++) {
    const z = (i - 2) * 0.6;
    const pts = [];
    for (let j = 0; j <= 20; j++) {
      pts.push(new THREE.Vector3(-3 + (j / 20) * 6, 0, z));
    }
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({
      color: CORAL_DEEP, transparent: true,
      opacity: 0.12 - Math.abs(i - 2) * 0.03,
      blending: THREE.NormalBlending, depthWrite: false
    });
    groundGroup.add(new THREE.Line(geo, mat));
  }
  scene.add(groundGroup);

  /* Subtle drifting dust (much fewer particles than the reference's 900) */
  const sparkCount = 120;
  const sparkPos = new Float32Array(sparkCount * 3);
  const sparkSpeed = new Float32Array(sparkCount);
  for (let i = 0; i < sparkCount; i++) {
    sparkPos[i*3]   = (Math.random() - 0.5) * 8;
    sparkPos[i*3+1] = Math.random() * 3;
    sparkPos[i*3+2] = (Math.random() - 0.5) * 4;
    sparkSpeed[i]   = 0.08 + Math.random() * 0.18;
  }
  const sparkGeo = new THREE.BufferGeometry();
  sparkGeo.setAttribute('position', new THREE.BufferAttribute(sparkPos, 3));
  const sparks = new THREE.Points(sparkGeo, new THREE.PointsMaterial({
    color: CORAL, size: 0.025, transparent: true, opacity: 0.32,
    sizeAttenuation: true, depthWrite: false, blending: THREE.NormalBlending
  }));
  scene.add(sparks);

  /* Load the model */
  const registries = { wires: [], points: [] };
  let mixer = null;
  let modelGroup = null;



  const loadingPromise = loadJaguarGLB().then(({ sceneClone, animations }) => {
    const model = sceneClone;
    const box = new THREE.Box3().setFromObject(model);
    // User-tuned model placement (locked via the ?edit=1 tuner panel).
    model.rotation.set(0.850, 0.690, -0.310);
    model.position.set(1.79, -0.05, 0.27);
    model.scale.setScalar(33.843);
    // Stash the locked values so the tuner sliders can apply offsets on top
    // (slider values default to 0 / 1 — meaning no change relative to locked pose).
    model.userData._origPos = model.position.clone();
    model.userData._origScale = model.scale.x;

    buildWireframeOverlay(model, registries);
    scene.add(model);
    modelGroup = model;

    // No animation — the GLB's only clip is a 14.67s locked-rearing idle
    // (confirmed by scrubbing bone rotations), so we render the bind pose
    // directly. No motion, no pulse, no parallax.
    mixer = null;
  }).catch(err => console.error('jaguar load:', err));

  /* Animation loop */
  const clock = new THREE.Clock();
  // No pointer/scroll tracking — the jaguar is a static mascot.

  let raf;
  let lastW = 0, lastH = 0;
  function tick() {
    raf = requestAnimationFrame(tick);

    // Resize check — if the canvas changed size, update renderer AND re-fit the camera
    // so the animal stays framed.
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if (w > 0 && h > 0 && (w !== lastW || h !== lastH)) {
      lastW = w; lastH = h;
      renderer.setSize(w, h, false);
      composer.setSize(w, h);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      // Camera is locked — only aspect needs updating
    }

    if (controls) {
      controls.update();
      // OrbitControls drives camera & target — push back to tune so sliders stay in sync
      tune.camX = camera.position.x; tune.camY = camera.position.y; tune.camZ = camera.position.z;
      tune.tgtX = controls.target.x; tune.tgtY = controls.target.y; tune.tgtZ = controls.target.z;
    }
    if (dbg) {
      // Sync slider/number values back to whatever Orbit just changed
      ['camX','camY','camZ','tgtX','tgtY','tgtZ'].forEach(k => {
        dbg.querySelectorAll('[data-tune="'+k+'"], [data-tune-num="'+k+'"]').forEach(el => {
          if (document.activeElement !== el) el.value = tune[k].toFixed(2);
        });
      });
      const sn = document.getElementById('jag-snip');
      if (sn) {
        const p = camera.position, t = controls ? controls.target : new THREE.Vector3();
        const m = modelGroup;
        sn.textContent =
          'camera.position.set(' + p.x.toFixed(2) + ', ' + p.y.toFixed(2) + ', ' + p.z.toFixed(2) + ');\n' +
          'camera.lookAt(' + t.x.toFixed(2) + ', ' + t.y.toFixed(2) + ', ' + t.z.toFixed(2) + ');\n' +
          'camera.fov = ' + camera.fov.toFixed(0) + ';\n' +
          (m ? ('model.rotation.set(' + m.rotation.x.toFixed(3) + ', ' + m.rotation.y.toFixed(3) + ', ' + m.rotation.z.toFixed(3) + ');\n' +
                'model.position.set(' + m.position.x.toFixed(2) + ', ' + m.position.y.toFixed(2) + ', ' + m.position.z.toFixed(2) + ');\n' +
                'model.scale.setScalar(' + m.scale.x.toFixed(3) + ');\n') : '') +
          '// glow\n' +
          'bloom.strength = ' + tune.bloomStrength.toFixed(2) + ';\n' +
          'bloom.radius = ' + tune.bloomRadius.toFixed(2) + ';\n' +
          'bloom.threshold = ' + tune.bloomThreshold.toFixed(2) + ';\n' +
          'wireOpacity = ' + tune.wireOpacity.toFixed(2) + ';\n' +
          'haloOpacity = ' + tune.haloOpacity.toFixed(2) + ';\n' +
          'floorOpacity = ' + tune.floorOpacity.toFixed(2) + ';';
      }
    }
    composer.render();
  }
  raf = requestAnimationFrame(tick);

  return {
    stop() {
      cancelAnimationFrame(raf);
      renderer.dispose();
      composer.dispose?.();
    }
  };
};

</script>

    // Hydrate project data from the build-time Airtable snapshot, then render.
    // If the snapshot can't be loaded, render with the data.js fallback already in memory.

      ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
    }

    fetch('airtable-projects.json', { cache: 'no-cache' })
      .then(r => r.ok ? r.json() : Promise.reject(r.status))
      .then(data => {
        if (data && Array.isArray(data.projects) && data.projects.length) {
          window.PANAMA_DATA.projects = data.projects;
          window.PANAMA_DATA._projectsSource = 'airtable';
          window.PANAMA_DATA._projectsGeneratedAt = data.generatedAt;
          window.PANAMA_DATA._projectsCount = data.count;

      })
      .catch(err => {
        console.info('[projects] using data.js fallback —', err);
        window.PANAMA_DATA._projectsSource = 'fallback';
      })
      .finally(renderApp);
  </script>
