}

.display em, .italic { font-style: italic; font-weight: 300; }
.eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-mute); }
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 26px; border-radius: 999px; font-family: var(--font-body); font-weight: 600; font-size: 14px; text-decoration: none; border: 1px solid transparent; cursor: pointer; transition: transform 0.4s var(--ease), box-shadow 0.4s var(--ease), background 0.3s var(--ease); }
.btn-coral { background: var(--coral); color: var(--paper); }
.btn-coral:hover { background: var(--coral-deep); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
