<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>The Journal — PanamaRealEstateGuide.com</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=Manrope:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles.css"/>
  <meta name="description" content="The Panama Real Estate Guide journal — 80+ articles on neighborhoods, residency, taxes, daily living, and moving to Panama."/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="../data.js"></script>
  <script type="text/babel" src="../components.jsx"></script>
  <script type="text/babel" src="../detail-chrome.jsx"></script>

  <script type="text/babel">
    function ArticlesIndex() {
      const all = window.PANAMA_DATA.articles;
      const cats = ['All', ...Array.from(new Set(all.map(a => a.category)))];
      const [cat, setCat] = React.useState('All');
      const [query, setQuery] = React.useState('');
      const filtered = all.filter(a => {
        if (cat !== 'All' && a.category !== cat) return false;
        if (query) {
          const q = query.toLowerCase();
          if (!(a.title.toLowerCase().includes(q) ||
                a.excerpt.toLowerCase().includes(q) ||
                a.category.toLowerCase().includes(q))) return false;
        }
        return true;
      });

      React.useEffect(() => {
        const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); }), { threshold: 0.1 });
        document.querySelectorAll('.reveal:not(.in)').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, [cat, query]);

      return (
        <>
          <DetailNav/>

          <section style={{ paddingTop: 96, paddingBottom: 32, background: 'var(--cream)' }}>
            <div className="container">
              <div style={{ marginBottom: 24 }}>
                <a href="../" style={{
                  fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--coral-deep)',
                  letterSpacing: '0.14em', textTransform: 'uppercase', textDecoration: 'none', fontWeight: 700,
                  display: 'inline-flex', alignItems: 'center', gap: 8
                }}>← Home</a>
              </div>
              <div className="reveal">
                <div className="eyebrow" style={{ marginBottom: 16 }}>
                  <span className="rule-coral"></span>The Journal · {all.length} articles
                </div>
                <h1 className="display" style={{ fontSize: 'clamp(48px, 8vw, 110px)', margin: 0, lineHeight: 0.94, letterSpacing: '-0.03em' }}>
                  Reporting, <em>from the ground.</em>
                </h1>
                <p style={{ fontSize: 18, lineHeight: 1.6, color: 'var(--ink-soft)', maxWidth: '60ch', margin: '24px 0 0' }}>
                  Market reports, residency guides, neighborhood deep-dives, cost-of-living breakdowns, and moving guides — written by our team in Panama, not syndicated.
                </p>
              </div>

              {/* Search + category filter */}
              <div className="reveal d1" style={{ marginTop: 56, display: 'grid', gridTemplateColumns: '1fr', gap: 16 }}>
                <input
                  type="text"
                  placeholder="Search articles…"
                  value={query}
                  onChange={e => setQuery(e.target.value)}
                  style={{
                    width: '100%', padding: '14px 18px',
                    border: '1px solid var(--line)', borderRadius: 10,
                    fontFamily: 'var(--font-body)', fontSize: 15,
                    background: 'var(--paper)', color: 'var(--ink)'
                  }}
                />
                <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
                  {cats.map(c => (
                    <button key={c} onClick={() => setCat(c)} style={{
                      padding: '8px 14px',
                      border: '1px solid ' + (cat === c ? 'var(--coral)' : 'var(--line)'),
                      background: cat === c ? 'var(--coral)' : 'var(--paper)',
                      color: cat === c ? 'var(--paper)' : 'var(--ink)',
                      fontFamily: 'var(--font-mono)', fontSize: 11,
                      letterSpacing: '0.12em', textTransform: 'uppercase', fontWeight: 700,
                      borderRadius: 999, cursor: 'pointer',
                      transition: 'all 0.2s ease'
                    }}>{c}</button>
                  ))}
                </div>
                <div style={{ fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--ink-mute)', letterSpacing: '0.14em', textTransform: 'uppercase' }}>
                  {filtered.length} {filtered.length === 1 ? 'article' : 'articles'}
                </div>
              </div>
            </div>
          </section>

          <section style={{ padding: '32px 0 120px', background: 'var(--cream)' }}>
            <div className="container">
              <div className="article-list" style={{
                display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 28
              }}>
                {filtered.map((a, i) => (
                  <a key={a.id} href={`${a.id}.html`} className="reveal" style={{
                    textDecoration: 'none', color: 'inherit', display: 'block',
                    transitionDelay: `${(i % 12) * 0.04}s`
                  }}>
                    <div className={`ph ph-${a.cover}`} data-label="" style={{
                      aspectRatio: '4/3', borderRadius: 10, overflow: 'hidden', marginBottom: 14
                    }}/>
                    <div style={{
                      fontSize: 10.5, fontFamily: 'var(--font-mono)', color: 'var(--coral-deep)',
                      letterSpacing: '0.16em', textTransform: 'uppercase', marginBottom: 8, fontWeight: 700
                    }}>{a.category}</div>
                    <h3 className="display" style={{ fontSize: 20, margin: '0 0 10px', lineHeight: 1.15 }}>
                      {a.title}
                    </h3>
                    <p style={{ color: 'var(--ink-soft)', fontSize: 13.5, lineHeight: 1.55, margin: '0 0 12px' }}>
                      {a.excerpt}
                    </p>
                    <div style={{ fontSize: 11, fontFamily: 'var(--font-mono)', color: 'var(--ink-mute)', letterSpacing: '0.1em' }}>
                      {a.date} · {a.read}
                    </div>
                  </a>
                ))}
              </div>
              {filtered.length === 0 && (
                <div style={{ textAlign: 'center', padding: '80px 20px', color: 'var(--ink-mute)' }}>
                  <p style={{ fontSize: 18, fontStyle: 'italic' }}>No articles match your search.</p>
                  <button onClick={() => { setCat('All'); setQuery(''); }} style={{
                    marginTop: 16, padding: '10px 20px', border: '1px solid var(--coral)',
                    background: 'var(--coral)', color: 'var(--paper)',
                    fontFamily: 'var(--font-mono)', fontSize: 11, letterSpacing: '0.14em', textTransform: 'uppercase', fontWeight: 700,
                    borderRadius: 999, cursor: 'pointer'
                  }}>Clear filters</button>
                </div>
              )}
            </div>
          </section>

          <DetailFooter/>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<ArticlesIndex/>);
  </script>
</body>
</html>
