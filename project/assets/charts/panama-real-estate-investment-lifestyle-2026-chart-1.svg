<?xml version="1.0" encoding="UTF-8"?>
<svg id="chart-donut" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="donut-title donut-desc">
      <title id="donut-title">Net rental yield breakdown, Panama City 2026</title>
      <desc id="donut-desc">Donut chart showing 5.2% net yield from a gross 8.5%, with 2.1% to maintenance, 0.7% to taxes, and 0.5% to vacancy.</desc>
      <rect width="720" height="480" fill="#FFFDF5"/>

      <!-- Header -->
      <text x="48" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">RENTAL YIELD · GROSS → NET · 2026</text>
      <text x="48" y="80" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="500" fill="#0B2733" letter-spacing="-0.5">What 8.5% gross <tspan font-style="italic" font-weight="300" fill="#6F8089">really</tspan> nets.</text>

      <!-- Donut chart -->
      <!-- Cumulative arcs on a circle r=120 cx=240 cy=280 stroke-width=42 -->
      <!-- Total: 8.5% — segments: net 5.2 / maint 2.1 / tax 0.7 / vacancy 0.5 -->
      <!-- Circumference = 2*pi*120 = ~754 -->
      <g transform="translate(240,280)">
        <!-- Background ring -->
        <circle r="120" fill="none" stroke="#F3E4C1" stroke-width="42"/>
        <!-- Net 5.2 / 8.5 = 61.2% → 461.4 of 754 -->
        <circle r="120" fill="none" stroke="#E86E4F" stroke-width="42"
                stroke-dasharray="461 754" stroke-dashoffset="0"
                transform="rotate(-90)"/>
        <!-- Maint 2.1 / 8.5 = 24.7% → 186 of 754, starts after 461 -->
        <circle r="120" fill="none" stroke="#0B2733" stroke-width="42"
                stroke-dasharray="186 754" stroke-dashoffset="-461"
                transform="rotate(-90)"/>
        <!-- Tax 0.7 / 8.5 = 8.2% → 62 of 754 -->
        <circle r="120" fill="none" stroke="#1F4E45" stroke-width="42"
                stroke-dasharray="62 754" stroke-dashoffset="-647"
                transform="rotate(-90)"/>
        <!-- Vacancy 0.5 / 8.5 = 5.9% → 45 of 754 -->
        <circle r="120" fill="none" stroke="#3A4F58" stroke-width="42"
                stroke-dasharray="45 754" stroke-dashoffset="-709"
                transform="rotate(-90)"/>

        <!-- Center label -->
        <text y="-4" font-family="Fraunces, Georgia, serif" font-size="56" font-weight="500" fill="#0B2733" text-anchor="middle" letter-spacing="-1.5">5.2%</text>
        <text y="22" font-family="Manrope, sans-serif" font-size="13" font-weight="500" fill="#3A4F58" text-anchor="middle">net yield</text>
        <text y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" text-anchor="middle" letter-spacing="1">FROM 8.5% GROSS</text>
      </g>

      <!-- Legend right column -->
      <g transform="translate(440, 180)" font-family="Manrope, sans-serif">
        <!-- Net -->
        <rect x="0" y="0" width="14" height="14" fill="#E86E4F" rx="2"/>
        <text x="24" y="11" font-size="14" font-weight="600" fill="#0B2733">Net to investor</text>
        <text x="240" y="11" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#0B2733" text-anchor="end">5.2%</text>
        <text x="24" y="28" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="0.8">61% OF GROSS · #E86E4F</text>

        <!-- Maintenance -->
        <rect x="0" y="56" width="14" height="14" fill="#0B2733" rx="2"/>
        <text x="24" y="67" font-size="14" font-weight="600" fill="#0B2733">Maintenance &amp; HOA</text>
        <text x="240" y="67" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#0B2733" text-anchor="end">2.1%</text>
        <text x="24" y="84" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="0.8">25% OF GROSS · #0B2733</text>

        <!-- Tax -->
        <rect x="0" y="112" width="14" height="14" fill="#1F4E45" rx="2"/>
        <text x="24" y="123" font-size="14" font-weight="600" fill="#0B2733">Property tax</text>
        <text x="240" y="123" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#0B2733" text-anchor="end">0.7%</text>
        <text x="24" y="140" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="0.8">8% OF GROSS · #1F4E45</text>

        <!-- Vacancy -->
        <rect x="0" y="168" width="14" height="14" fill="#3A4F58" rx="2"/>
        <text x="24" y="179" font-size="14" font-weight="600" fill="#0B2733">Vacancy</text>
        <text x="240" y="179" font-family="JetBrains Mono, monospace" font-size="13" font-weight="500" fill="#0B2733" text-anchor="end">0.5%</text>
        <text x="24" y="196" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="0.8">6% OF GROSS · #3A4F58</text>
      </g>

      <text x="48" y="450" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">Source · PRG analysis · Casco / Costa del Este 1BR · 12-month rolling</text>
    </svg>