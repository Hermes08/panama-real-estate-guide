<?xml version="1.0" encoding="UTF-8"?>
<svg id="chart-line" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="line-title line-desc">
      <title id="line-title">Boquete real estate appreciation 2018 to 2026</title>
      <desc id="line-desc">Line chart showing Boquete property prices rising from $1,150/m² in 2018 to $2,100/m² in 2026, with a +38% YoY callout in 2024.</desc>
      <rect width="720" height="400" fill="#FFFDF5"/>

      <!-- Tag -->
      <text x="48" y="38" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">BOQUETE · CHIRIQUÍ HIGHLANDS</text>
      <text x="48" y="76" font-family="Fraunces, Georgia, serif" font-size="40" font-weight="500" fill="#0B2733" letter-spacing="-0.6">+82% appreciation</text>
      <text x="48" y="98" font-family="Manrope, sans-serif" font-size="13" fill="#3A4F58">Median price per m² · 2018 → 2026</text>

      <!-- Y axis gridlines and labels -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">
        <line x1="80" y1="160" x2="680" y2="160" stroke="#E8DECC"/>
        <text x="64" y="164" text-anchor="end">$2,200</text>
        <line x1="80" y1="220" x2="680" y2="220" stroke="#E8DECC"/>
        <text x="64" y="224" text-anchor="end">$1,800</text>
        <line x1="80" y1="280" x2="680" y2="280" stroke="#E8DECC"/>
        <text x="64" y="284" text-anchor="end">$1,400</text>
        <line x1="80" y1="340" x2="680" y2="340" stroke="#E8DECC"/>
        <text x="64" y="344" text-anchor="end">$1,000</text>
      </g>

      <!-- X axis labels -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">
        <text x="80" y="362" text-anchor="middle">2018</text>
        <text x="155" y="362" text-anchor="middle">2019</text>
        <text x="230" y="362" text-anchor="middle">2020</text>
        <text x="305" y="362" text-anchor="middle">2021</text>
        <text x="380" y="362" text-anchor="middle">2022</text>
        <text x="455" y="362" text-anchor="middle">2023</text>
        <text x="530" y="362" text-anchor="middle">2024</text>
        <text x="605" y="362" text-anchor="middle">2025</text>
        <text x="680" y="362" text-anchor="middle">2026</text>
      </g>

      <!-- Comparison line: Panama City avg (ink dashed) -->
      <polyline points="80,318 155,310 230,300 305,288 380,272 455,256 530,238 605,222 680,210"
                fill="none" stroke="#0B2733" stroke-width="1.5" stroke-dasharray="3 4"/>

      <!-- Main line: Boquete (coral solid) -->
      <polyline points="80,330 155,322 230,316 305,300 380,278 455,250 530,196 605,168 680,150"
                fill="none" stroke="#E86E4F" stroke-width="2.5" stroke-linejoin="round"/>

      <!-- Data points -->
      <g fill="#E86E4F">
        <circle cx="80" cy="330" r="3.5"/>
        <circle cx="155" cy="322" r="3.5"/>
        <circle cx="230" cy="316" r="3.5"/>
        <circle cx="305" cy="300" r="3.5"/>
        <circle cx="380" cy="278" r="3.5"/>
        <circle cx="455" cy="250" r="3.5"/>
        <circle cx="530" cy="196" r="5" stroke="#FFFDF5" stroke-width="2"/>
        <circle cx="605" cy="168" r="3.5"/>
        <circle cx="680" cy="150" r="3.5"/>
      </g>

      <!-- Annotation callout for 2024 -->
      <g>
        <line x1="530" y1="186" x2="530" y2="138" stroke="#C2452A" stroke-width="1"/>
        <rect x="478" y="116" width="118" height="22" fill="#C2452A" rx="2"/>
        <text x="537" y="131" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#FFF9EC" text-anchor="middle" letter-spacing="0.6">+38% YoY · 2024</text>
      </g>

      <!-- Endpoint label -->
      <text x="688" y="148" font-family="JetBrains Mono, monospace" font-size="11" font-weight="500" fill="#C2452A">$2,100</text>
      <text x="688" y="214" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733">$1,720</text>

      <!-- Legend -->
      <g font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="1.4">
        <line x1="48" y1="386" x2="68" y2="386" stroke="#E86E4F" stroke-width="2.5"/>
        <text x="74" y="389" fill="#0B2733">BOQUETE</text>
        <line x1="160" y1="386" x2="180" y2="386" stroke="#0B2733" stroke-width="1.5" stroke-dasharray="3 4"/>
        <text x="186" y="389" fill="#0B2733">PANAMA CITY AVG</text>
      </g>
      <text x="680" y="389" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" text-anchor="end" letter-spacing="1">Source · ACOBIR / Inmobilia · Apr 2026</text>
    </svg>