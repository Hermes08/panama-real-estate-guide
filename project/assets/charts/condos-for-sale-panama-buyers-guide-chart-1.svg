<?xml version="1.0" encoding="UTF-8"?>
<svg id="chart-map" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 540" role="img" aria-labelledby="map-title map-desc">
      <title id="map-title">Heatmap of Panama by price per square meter, 7 zones, 2026</title>
      <desc id="map-desc">Heatmap showing Panama City and Punta Pacífica as highest-priced zones, with Bocas del Toro and Volcán as more affordable.</desc>
      <rect width="720" height="540" fill="#FFFDF5"/>

      <!-- Header -->
      <text x="48" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">PRICE PER M² · BY ZONE · 2026</text>
      <text x="48" y="80" font-family="Fraunces, Georgia, serif" font-size="32" font-weight="500" fill="#0B2733" letter-spacing="-0.5">Where Panama prices the most.</text>

      <!-- Country base outline (stylized — wide horizontal "S" shape) -->
      <g transform="translate(60, 130)">
        <!-- A simplified, more abstract Panama silhouette across 600x300 -->
        <path d="M 20,180 C 60,140 110,150 150,160 C 200,170 240,140 290,130 C 340,120 380,135 420,150 C 460,165 510,160 550,150 C 590,140 600,160 590,200 C 580,240 540,260 490,250 C 440,240 410,260 370,265 C 320,270 280,240 240,235 C 200,230 150,260 110,255 C 70,250 30,230 20,200 Z"
              fill="#F3E4C1" stroke="#0B2733" stroke-width="1.2" stroke-linejoin="round"/>

        <!-- Zone overlays — drawn as soft rounded blobs over the country outline -->
        <!-- Bocas del Toro (NW) — light bucket -->
        <g>
          <ellipse cx="80" cy="180" rx="38" ry="26" fill="#E86E4F" opacity="0.32"/>
          <circle cx="80" cy="180" r="3" fill="#0B2733"/>
          <text x="80" y="142" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">Bocas del Toro</text>
          <text x="80" y="156" font-family="JetBrains Mono, monospace" font-size="11" fill="#C2452A" text-anchor="middle">$1,400/m²</text>
        </g>

        <!-- Volcán -->
        <g>
          <ellipse cx="155" cy="160" rx="32" ry="22" fill="#E86E4F" opacity="0.22"/>
          <circle cx="155" cy="160" r="3" fill="#0B2733"/>
          <text x="155" y="124" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">Volcán</text>
          <text x="155" y="138" font-family="JetBrains Mono, monospace" font-size="11" fill="#C2452A" text-anchor="middle">$1,150/m²</text>
        </g>

        <!-- Boquete -->
        <g>
          <ellipse cx="230" cy="148" rx="34" ry="22" fill="#E86E4F" opacity="0.55"/>
          <circle cx="230" cy="148" r="3" fill="#0B2733"/>
          <text x="230" y="218" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">Boquete</text>
          <text x="230" y="232" font-family="JetBrains Mono, monospace" font-size="11" fill="#C2452A" text-anchor="middle">$2,100/m²</text>
        </g>

        <!-- Coronado -->
        <g>
          <ellipse cx="345" cy="180" rx="32" ry="22" fill="#E86E4F" opacity="0.45"/>
          <circle cx="345" cy="180" r="3" fill="#0B2733"/>
          <text x="345" y="142" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">Coronado</text>
          <text x="345" y="156" font-family="JetBrains Mono, monospace" font-size="11" fill="#C2452A" text-anchor="middle">$1,850/m²</text>
        </g>

        <!-- Pedasí / Azuero -->
        <g>
          <ellipse cx="370" cy="248" rx="34" ry="22" fill="#E86E4F" opacity="0.38"/>
          <circle cx="370" cy="248" r="3" fill="#0B2733"/>
          <text x="370" y="288" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">Pedasí</text>
          <text x="370" y="302" font-family="JetBrains Mono, monospace" font-size="11" fill="#C2452A" text-anchor="middle">$1,620/m²</text>
        </g>

        <!-- Panama City -->
        <g>
          <ellipse cx="475" cy="195" rx="46" ry="28" fill="#E86E4F" opacity="0.95"/>
          <circle cx="475" cy="195" r="4" fill="#FFF9EC" stroke="#C2452A" stroke-width="2"/>
          <text x="475" y="244" font-family="Manrope, sans-serif" font-size="13" font-weight="700" fill="#0B2733" text-anchor="middle">Panama City</text>
          <text x="475" y="260" font-family="JetBrains Mono, monospace" font-size="12" font-weight="500" fill="#C2452A" text-anchor="middle">$3,200/m²</text>
        </g>

        <!-- San Blas / Guna Yala (NE) -->
        <g>
          <ellipse cx="555" cy="170" rx="32" ry="20" fill="#E86E4F" opacity="0.18"/>
          <circle cx="555" cy="170" r="3" fill="#0B2733"/>
          <text x="555" y="138" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#0B2733" text-anchor="middle">San Blas</text>
          <text x="555" y="152" font-family="JetBrains Mono, monospace" font-size="11" fill="#6F8089" text-anchor="middle">N/A · indigenous</text>
        </g>
      </g>

      <!-- Legend / scale -->
      <g transform="translate(440, 478)">
        <text x="0" y="-6" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1.4">PRICE PER M² · 2026</text>
        <rect x="0" y="0" width="40" height="12" fill="#E86E4F" opacity="0.18"/>
        <rect x="40" y="0" width="40" height="12" fill="#E86E4F" opacity="0.38"/>
        <rect x="80" y="0" width="40" height="12" fill="#E86E4F" opacity="0.55"/>
        <rect x="120" y="0" width="40" height="12" fill="#E86E4F" opacity="0.75"/>
        <rect x="160" y="0" width="40" height="12" fill="#E86E4F" opacity="0.95"/>
        <text x="0" y="28" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089">$1.1k</text>
        <text x="200" y="28" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="end">$3.2k</text>
      </g>

      <text x="48" y="518" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">Source · ACOBIR · Apr 2026 · Median ask price, new construction</text>
    </svg>