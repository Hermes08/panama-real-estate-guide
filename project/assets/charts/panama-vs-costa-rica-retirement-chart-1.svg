<?xml version="1.0" encoding="UTF-8"?>
<svg id="chart-vs" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" role="img" aria-labelledby="vs-title vs-desc">
      <title id="vs-title">Panama vs Costa Rica retirement comparison, 8 metrics, 2026</title>
      <desc id="vs-desc">Side-by-side comparison. Panama wins on visa cost, healthcare, and tax. Costa Rica wins on English proficiency.</desc>
      <rect width="720" height="720" fill="#FFFDF5"/>

      <!-- Tag -->
      <text x="48" y="48" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">RETIREMENT COMPARISON · 2026</text>
      <text x="48" y="84" font-family="Fraunces, Georgia, serif" font-size="34" font-weight="500" fill="#0B2733" letter-spacing="-0.5">Panama <tspan font-style="italic" font-weight="300" fill="#6F8089">vs.</tspan> Costa Rica</text>

      <!-- Country headers -->
      <g font-family="Fraunces, Georgia, serif">
        <text x="200" y="160" font-size="22" font-weight="500" fill="#0B2733" text-anchor="middle">Panama</text>
        <text x="200" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" text-anchor="middle" letter-spacing="1.4">PA · 4.4M POP</text>

        <text x="520" y="160" font-size="22" font-weight="500" fill="#0B2733" text-anchor="middle">Costa Rica</text>
        <text x="520" y="182" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" text-anchor="middle" letter-spacing="1.4">CR · 5.2M POP</text>
      </g>

      <!-- Center divider -->
      <line x1="360" y1="200" x2="360" y2="640" stroke="#0B2733" stroke-width="1"/>

      <!-- 8 metric rows -->
      <g font-family="Manrope, sans-serif">
        <!-- Row 1 Visa cost -->
        <text x="360" y="232" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">VISA COST</text>
        <text x="200" y="262" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$5,000</text>
        <text x="520" y="262" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$2,500</text>
        <rect x="487" y="244" width="6" height="22" fill="#E86E4F" rx="3"/>
        <line x1="48" y1="284" x2="672" y2="284" stroke="#E8DECC"/>

        <!-- Row 2 Rent -->
        <text x="360" y="306" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">RENT · CAPITAL 1BR</text>
        <text x="200" y="336" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$1,100</text>
        <text x="520" y="336" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$1,250</text>
        <rect x="167" y="318" width="6" height="22" fill="#E86E4F" rx="3"/>
        <line x1="48" y1="358" x2="672" y2="358" stroke="#E8DECC"/>

        <!-- Row 3 Healthcare -->
        <text x="360" y="380" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">HEALTHCARE · MO.</text>
        <text x="200" y="410" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$140</text>
        <text x="520" y="410" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">$190</text>
        <rect x="167" y="392" width="6" height="22" fill="#E86E4F" rx="3"/>
        <line x1="48" y1="432" x2="672" y2="432" stroke="#E8DECC"/>

        <!-- Row 4 Cap gains -->
        <text x="360" y="454" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">CAP GAINS TAX</text>
        <text x="200" y="484" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">10%</text>
        <text x="520" y="484" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">15%</text>
        <rect x="167" y="466" width="6" height="22" fill="#E86E4F" rx="3"/>
        <line x1="48" y1="506" x2="672" y2="506" stroke="#E8DECC"/>

        <!-- Row 5 COL index -->
        <text x="360" y="528" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">COST OF LIVING IDX</text>
        <text x="200" y="558" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">42.6</text>
        <text x="520" y="558" font-family="Fraunces, serif" font-size="28" font-weight="500" fill="#0B2733" text-anchor="middle">48.9</text>
        <rect x="167" y="540" width="6" height="22" fill="#E86E4F" rx="3"/>
        <line x1="48" y1="580" x2="672" y2="580" stroke="#E8DECC"/>

        <!-- Row 6 English -->
        <text x="360" y="602" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle" letter-spacing="0.5">ENGLISH PROFICIENCY</text>
        <text x="200" y="632" font-family="Fraunces, serif" font-size="22" font-weight="500" fill="#0B2733" text-anchor="middle">Moderate</text>
        <text x="520" y="632" font-family="Fraunces, serif" font-size="22" font-weight="500" fill="#0B2733" text-anchor="middle">High</text>
        <rect x="487" y="614" width="6" height="22" fill="#E86E4F" rx="3"/>
      </g>

      <!-- Footer source -->
      <text x="48" y="688" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">Source · World Bank, Numbeo, EF EPI · Apr 2026</text>
      <text x="672" y="688" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" text-anchor="end" letter-spacing="1.4">SEE FULL COMPARISON →</text>
    </svg>