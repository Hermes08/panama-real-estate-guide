<?xml version="1.0" encoding="UTF-8"?>
<svg id="chart-water" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" role="img" aria-labelledby="water-title water-desc">
      <title id="water-title">Real cost of moving to Panama, cumulative breakdown 2026</title>
      <desc id="water-desc">Waterfall chart of seven cost categories totaling $24,800 first-year expat cost.</desc>
      <rect width="720" height="480" fill="#FFFDF5"/>

      <!-- Header -->
      <text x="48" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">FIRST-YEAR EXPAT COST · 2026</text>
      <text x="48" y="84" font-family="Fraunces, Georgia, serif" font-size="42" font-weight="500" fill="#0B2733" letter-spacing="-0.6">$24,800 <tspan font-style="italic" font-weight="300" fill="#6F8089">all-in.</tspan></text>
      <text x="48" y="106" font-family="Manrope, sans-serif" font-size="13" fill="#3A4F58">From Toronto, family of two, mid-tier setup</text>

      <!-- Y axis gridlines -->
      <g font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">
        <line x1="80" y1="160" x2="690" y2="160" stroke="#E8DECC"/>
        <text x="72" y="164" text-anchor="end">$25k</text>
        <line x1="80" y1="220" x2="690" y2="220" stroke="#E8DECC"/>
        <text x="72" y="224" text-anchor="end">$18k</text>
        <line x1="80" y1="280" x2="690" y2="280" stroke="#E8DECC"/>
        <text x="72" y="284" text-anchor="end">$12k</text>
        <line x1="80" y1="340" x2="690" y2="340" stroke="#E8DECC"/>
        <text x="72" y="344" text-anchor="end">$6k</text>
        <line x1="80" y1="400" x2="690" y2="400" stroke="#0B2733" stroke-width="1"/>
        <text x="72" y="404" text-anchor="end">$0</text>
      </g>

      <!-- Cumulative waterfall bars (ink, ascending; final bar coral) -->
      <!-- Each bar shows just the increment, stacked from the running total -->
      <g>
        <!-- Shipping container $4,200 -->
        <rect x="105" y="364" width="64" height="36" fill="#0B2733"/>
        <text x="137" y="358" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$4,200</text>
        <text x="137" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Shipping</text>
        <text x="137" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">CONTAINER</text>

        <!-- Visa & legal $5,400 (cumulative $9,600) -->
        <rect x="189" y="318" width="64" height="46" fill="#0B2733"/>
        <text x="221" y="312" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$5,400</text>
        <text x="221" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Visa / legal</text>
        <text x="221" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">FRIENDLY NATIONS</text>
        <line x1="253" y1="364" x2="273" y2="364" stroke="#6F8089" stroke-dasharray="2 2"/>
        <line x1="253" y1="318" x2="273" y2="318" stroke="#6F8089" stroke-dasharray="2 2"/>

        <!-- Rental deposit $3,300 (cum $12,900) -->
        <rect x="273" y="290" width="64" height="28" fill="#0B2733"/>
        <text x="305" y="284" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$3,300</text>
        <text x="305" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Rental deposit</text>
        <text x="305" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">FIRST + LAST + SEC.</text>
        <line x1="337" y1="318" x2="357" y2="318" stroke="#6F8089" stroke-dasharray="2 2"/>
        <line x1="337" y1="290" x2="357" y2="290" stroke="#6F8089" stroke-dasharray="2 2"/>

        <!-- Furniture $4,600 (cum $17,500) -->
        <rect x="357" y="252" width="64" height="38" fill="#0B2733"/>
        <text x="389" y="246" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$4,600</text>
        <text x="389" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Furniture</text>
        <text x="389" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">FULL RESET</text>
        <line x1="421" y1="290" x2="441" y2="290" stroke="#6F8089" stroke-dasharray="2 2"/>
        <line x1="421" y1="252" x2="441" y2="252" stroke="#6F8089" stroke-dasharray="2 2"/>

        <!-- Vehicle $4,800 (cum $22,300) -->
        <rect x="441" y="212" width="64" height="40" fill="#0B2733"/>
        <text x="473" y="206" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$4,800</text>
        <text x="473" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Vehicle</text>
        <text x="473" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">USED IMPORT</text>
        <line x1="505" y1="252" x2="525" y2="252" stroke="#6F8089" stroke-dasharray="2 2"/>
        <line x1="505" y1="212" x2="525" y2="212" stroke="#6F8089" stroke-dasharray="2 2"/>

        <!-- Buffer $2,500 (cum $24,800) -->
        <rect x="525" y="191" width="64" height="21" fill="#0B2733"/>
        <text x="557" y="185" font-family="JetBrains Mono, monospace" font-size="11" fill="#0B2733" text-anchor="middle">$2,500</text>
        <text x="557" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="600" fill="#3A4F58" text-anchor="middle">Buffer</text>
        <text x="557" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#6F8089" text-anchor="middle" letter-spacing="0.6">CONTINGENCY</text>
        <line x1="589" y1="212" x2="609" y2="212" stroke="#6F8089" stroke-dasharray="2 2"/>
        <line x1="589" y1="191" x2="609" y2="191" stroke="#6F8089" stroke-dasharray="2 2"/>

        <!-- TOTAL coral $24,800 -->
        <rect x="609" y="191" width="74" height="209" fill="#E86E4F" rx="3"/>
        <text x="646" y="184" font-family="Fraunces, Georgia, serif" font-size="22" font-weight="500" fill="#C2452A" text-anchor="middle">$24,800</text>
        <text x="646" y="426" font-family="Manrope, sans-serif" font-size="11" font-weight="700" fill="#0B2733" text-anchor="middle">Total</text>
        <text x="646" y="440" font-family="JetBrains Mono, monospace" font-size="9" fill="#C2452A" text-anchor="middle" letter-spacing="0.6">YEAR ONE</text>
      </g>

      <!-- "Average others quote" reference line -->
      <line x1="80" y1="232" x2="690" y2="232" stroke="#0B2733" stroke-dasharray="3 4" stroke-width="0.8" opacity="0.5"/>
      <text x="690" y="228" font-family="JetBrains Mono, monospace" font-size="9" fill="#0B2733" text-anchor="end" letter-spacing="0.8">OFTEN QUOTED · $16K</text>

      <text x="48" y="464" font-family="JetBrains Mono, monospace" font-size="10" fill="#6F8089" letter-spacing="1">Source · PRG reader survey, n=82 · Mar 2026</text>
    </svg>