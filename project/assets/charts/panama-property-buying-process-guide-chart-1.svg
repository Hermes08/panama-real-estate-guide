  <title id="t">Panama property purchase process stage costs</title>
  <desc id="d">Waterfall chart of stage costs in a Panama property purchase: $5k reservation, $3.5k due diligence, $40k promise of sale, $4.5k mortgage origination, $6.5k closing.</desc>
  <rect width="720" height="480" fill="#FFFDF5"/>
  <text x="48" y="42" font-family="JetBrains Mono, monospace" font-size="10" fill="#C2452A" letter-spacing="1.6">BUYING PROCESS · 60-DAY TIMELINE</text>
  <text x="48" y="84" font-family="Fraunces, Georgia, serif" font-size="42" font-weight="500" fill="#0B2733" letter-spacing="-0.6">60 days <tspan font-style="italic" font-weight="300" fill="#6F8089">reservation → keys.</tspan></text>
  <text x="48" y="106" font-family="Manrope, sans-serif" font-size="13" fill="#3A4F58">Panama property purchase process · stage cost breakdown</text>
