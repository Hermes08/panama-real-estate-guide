<line x1="80" y1="280" x2="690" y2="280" stroke="#E8DECC" stroke-width="1"/>
<text x="72" y="284" text-anchor="end">$29k</text>
<line x1="80" y1="340" x2="690" y2="340" stroke="#E8DECC" stroke-width="1"/>
<text x="72" y="344" text-anchor="end">$14k</text>
<line x1="80" y1="400" x2="690" y2="400" stroke="#0B2733" stroke-width="1"/>
<text x="72" y="404" text-anchor="end">$0</text>
</g>
  <g>
